name: Build and Deploy APKs

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Autorise le robot à renvoyer les fichiers sur GitHub

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: |
          cd client
          npm install --legacy-peer-deps

      - name: Build Web App
        run: |
          cd client
          npm run build
          # Copier le site web vers le backend pour Railway
          mkdir -p ../backend/public/dist
          cp -r dist/* ../backend/public/dist/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Client APK
        run: |
          cd client
          cp capacitor.config.json capacitor.config.json.bak
          chmod +x android/gradlew
          npx cap sync android
          cd android && ./gradlew clean assembleDebug && cd ..
          cp android/app/build/outputs/apk/debug/app-debug.apk ../backend/public/PrixOr.apk

      - name: Build Admin APK
        run: |  
          cd client
          # Utiliser la config Admin (URL pointe vers /admin)
          cp capacitor.admin.config.json capacitor.config.json
          # Changer SEULEMENT le nom de l'application (pas le package ID)
          sed -i 's/>PrixOr</>PrixOr Admin</g' android/app/src/main/res/values/strings.xml
          sed -i 's/"app_name">PrixOr</"app_name">PrixOr Admin</g' android/app/src/main/res/values/strings.xml
          chmod +x android/gradlew
          npx cap sync android
          cd android && ./gradlew clean assembleDebug && cd ..
          cp android/app/build/outputs/apk/debug/app-debug.apk ../backend/public/PrixOr-Admin.apk

      - name: Commit and Push APKs to GitHub
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add backend/public/
          git commit -m "Auto: Mise à jour des APK et du site web (v1.1.0)" || echo "No changes to commit"
          git push origin main

      - name: Deploy site to gh-pages (gold.techniskane.com)
        run: |
          cd client
          # Copier le dist dans un dossier temporaire
          cp -r dist /tmp/site-deploy
          cd /tmp/site-deploy
          git init
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          git commit -m "Auto-deploy: PrixOr site v1.1.0"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/othmanbakkali/Gold_Project.git HEAD:gh-pages
